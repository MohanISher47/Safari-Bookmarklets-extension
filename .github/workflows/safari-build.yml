name: Build Safari Extension
on: [push, workflow_dispatch]

jobs:
  build-safari:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert to Safari Extension
        run: |
          # Converts your folder into an Xcode project
          xcrun safari-web-extension-converter . --no-open --project-location ./SafariProject --app-name "LemonadeCity"

      - name: Build macOS App
        run: |
          cd SafariProject/LemonadeCity
          # Compiles the Xcode project into a usable .app
          xcodebuild -project "LemonadeCity.xcodeproj" -scheme "LemonadeCity (macOS)" -configuration Debug clean build CONFIGURATION_BUILD_DIR="../../output"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Safari-Extension-App
          path: output/LemonadeCity.app