name: Build Safari Extension
on: [push, workflow_dispatch] # Runs every time you upload code or click a button

jobs:
  build-safari:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert to Safari Extension
        run: |
          # This command creates the Xcode project from your Chrome files
          # Replace 'Bookmarklets' with whatever you want the app named
          xcrun safari-web-extension-converter . --no-open --project-location ./SafariExtension --app-name "Bookmarklets"

      - name: Build the App
        run: |
          # This builds the actual .app file from the Xcode project
          cd SafariExtension/Bookmarklets
          xcodebuild -project "Bookmarklets.xcodeproj" -scheme "Bookmarklets (macOS)" -configuration Debug clean build CONFIGURATION_BUILD_DIR="../../output"

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Safari-Extension-App
          path: output/Bookmarklets.app
